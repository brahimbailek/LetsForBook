# Railpack configuration for Railway deployment

[languages.node]
version = "22"
packageManager = "pnpm"

[phases.install]
cmd = "npm install -g pnpm@9.1.0 && pnpm install --frozen-lockfile"

[phases.build]
cmd = "pnpm db:generate && pnpm build --filter=web"

[start]
cmd = "cd apps/web && pnpm start"

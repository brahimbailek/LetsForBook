# Nixpacks configuration for Railway deployment
# Forces pnpm usage for workspace:* protocol support

[phases.setup]
nixPkgs = ["nodejs-22_x", "nodePackages.pnpm"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9.1.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm build --filter=web"
]

[start]
cmd = "cd apps/web && pnpm start"

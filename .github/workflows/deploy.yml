name: Deploy to OCI Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: "-avz --delete --exclude='.env' --exclude='node_modules/' --exclude='.next/' --exclude='*.log'"

      - name: Install, build and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Toujours réécrire le .env depuis les secrets GitHub
            # Next.js lit le .env depuis apps/web/ (répertoire de travail de l'app)
            cat > apps/web/.env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NODE_ENV=production
            EOF

            # Rendre DATABASE_URL disponible pour les commandes Prisma
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"

            # Installer les dépendances
            npm install

            # Générer Prisma
            npm run db:generate

            # Synchroniser le schéma Prisma avec la DB (ajoute les colonnes manquantes)
            npm run db:push -- --accept-data-loss --skip-generate

            # Builder l'app (augmente la mémoire Node.js pour le build)
            NODE_OPTIONS="--max-old-space-size=1536" npm run build:web

            # Démarrer ou redémarrer avec PM2
            if pm2 describe letsforbook > /dev/null 2>&1; then
              pm2 restart letsforbook
            else
              pm2 start "npm start" --name letsforbook --cwd /app/letsforbook/apps/web
              pm2 save
            fi
